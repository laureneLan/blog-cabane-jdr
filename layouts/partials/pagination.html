{{/* Reçoit .Paginator en entrée */}}
{{ if gt .TotalPages 1 }}
<nav class="pagination" aria-label="Pagination">
  {{ if .HasPrev }}
  <a class="page-link link-fx" href="{{ .Prev.URL }}" rel="prev" aria-label="Page précédente">←</a>
  {{ else }}
  <span class="page-link" aria-disabled="true" aria-label="Pas de page précédente">←</span>
  {{ end }}
  {{ if .HasNext }}
  <a class="page-link link-fx" href="{{ .Next.URL }}" rel="next" aria-label="Page suivante">→</a>
  {{ else }}
  <span class="page-link" aria-disabled="true" aria-label="Pas de page suivante">→</span>
  {{ end }}
</nav>
{{ end }}
