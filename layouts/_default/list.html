{{ define "main" }}
{{- $paginator := .Paginate .Pages -}}
<h1 class="page-title">{{ .Title }}</h1>
<p class="page-count">
  {{ len .Pages }} article{{ if gt (len .Pages) 1 }}s{{ end }}
</p>

<ul class="article-list">
  {{ range $paginator.Pages }}
  {{ partial "article-card.html" . }}
  {{ end }}
</ul>
{{ partial "pagination.html" .Paginator }}
{{ end }}
