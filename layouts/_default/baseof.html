<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
{{ partial "header.html" . }}
    <main id="contenu">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    <a class="scroll-top link-fx" id="scroll-top" href="#" aria-label="Revenir en haut de page">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M2 9l5-5 5 5"/></svg>
    </a>
    {{ $js := resources.Get "js/main.js" | fingerprint }}
    <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}" crossorigin="anonymous" defer></script>
  </body>
</html>
